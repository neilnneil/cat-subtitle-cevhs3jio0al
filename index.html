<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#35987;&#21674;&#23383;&#24149;&#24037;&#20855;</title>
  <style>
    :root {
      --paper: #fffaf3;
      --ink: #23201d;
      --muted: rgba(35, 32, 29, 0.7);
      --line: rgba(35, 32, 29, 0.14);
      --accent: #2f7a67;
      --accent-dark: #21564a;
      --canvas-bg: #f2ede4;
    }

    * { box-sizing: border-box; }

    html {
      width: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
      background:
        linear-gradient(120deg, rgba(47, 122, 103, 0.14), transparent 34%),
        linear-gradient(300deg, rgba(205, 88, 60, 0.14), transparent 32%),
        #f6f1ea;
      padding: clamp(8px, 2vw, 20px);
    }

    .app {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 360px) minmax(0, 1fr);
      gap: clamp(10px, 2vw, 20px);
      align-items: stretch;
    }

    .tools,
    .preview-area {
      min-width: 0;
      background: rgba(255, 250, 243, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 42px rgba(42, 35, 28, 0.12);
    }

    .tools { padding: 18px; }

    h1 {
      margin: 0 0 14px;
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 14px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      max-width: 100%;
      min-height: 122px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      line-height: 1.55;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .value {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    .actions button {
      flex: 1 1 140px;
    }

    .primary {
      color: #fff;
      background: var(--accent);
    }

    .primary:hover { background: var(--accent-dark); }

    .secondary {
      color: var(--ink);
      background: rgba(35, 32, 29, 0.08);
    }

    .preview-area {
      min-height: min(58vh, 560px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2vw, 18px);
      background: var(--canvas-bg);
    }

    .save-card {
      width: 100%;
      max-width: min(100%, 520px);
    }

    .save-image {
      display: block;
      width: 100%;
      max-height: min(58vh, 560px);
      height: auto;
      border-radius: 8px;
      box-shadow: 0 16px 38px rgba(35, 32, 29, 0.18);
      background: #fff;
      -webkit-touch-callout: default;
      user-select: none;
    }

    canvas {
      display: none;
    }

    .save-hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .tools { padding: 14px; }
      .preview-area { min-height: 0; }
    }

    @media (max-width: 430px) {
      body { padding: 8px; }
      h1 { font-size: 22px; }
      textarea { min-height: 96px; }
      .tools { padding: 12px; }
      .control-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .actions { gap: 8px; }
      .actions button { flex-basis: 100%; }
      .save-image { max-height: 48vh; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="tools">
      <h1>&#35987;&#21674;&#23383;&#24149;&#24037;&#20855;</h1>

      <label for="subtitle">&#23383;&#24149;&#20839;&#23481;</label>
      <textarea id="subtitle" maxlength="80">&#20170;&#22825;&#20063;&#35201;&#35352;&#24471;&#39221;&#25105;&#12290;</textarea>

      <div class="control-grid">
        <div>
          <label for="fontSize">&#23383;&#22411;&#22823;&#23567;</label>
          <input id="fontSize" type="range" min="20" max="60" value="34">
          <div id="fontSizeValue" class="value">34 px</div>
        </div>
        <div>
          <label for="bottomGap">&#24213;&#37096;&#36317;&#38626;</label>
          <input id="bottomGap" type="range" min="12" max="80" value="26">
          <div id="bottomGapValue" class="value">26 px</div>
        </div>
      </div>

      <div class="control-grid">
        <div>
          <label for="strokeWidth">&#25551;&#37002;&#31895;&#32048;</label>
          <input id="strokeWidth" type="range" min="0" max="8" value="4">
          <div id="strokeWidthValue" class="value">4 px</div>
        </div>
        <div>
          <label for="maxWidth">&#23383;&#24149;&#23532;&#24230;</label>
          <input id="maxWidth" type="range" min="55" max="95" value="84">
          <div id="maxWidthValue" class="value">84 %</div>
        </div>
      </div>

      <div class="actions">
        <button id="downloadBtn" class="primary" type="button">&#19979;&#36617;&#22294;&#29255;</button>
        <button id="resetBtn" class="secondary" type="button">&#37325;&#35373;</button>
      </div>
    </section>

    <section class="preview-area">
      <div class="save-card">
        <img id="saveImage" class="save-image" alt="cat subtitle preview" draggable="false">
        <canvas id="preview" width="291" height="364"></canvas>
        <p id="saveHint" class="save-hint">&#25163;&#27231;&#21487;&#38263;&#25353;&#22294;&#29255;&#65292;&#36984;&#25799;&#20786;&#23384;&#22294;&#29255;&#25110;&#21152;&#20837;&#29031;&#29255;&#12290;</p>
      </div>
    </section>
  </main>

    const ctx = canvas.getContext("2d");

    const valueEls = {
      fontSize: document.getElementById("fontSizeValue"),
      bottomGap: document.getElementById("bottomGapValue"),
      strokeWidth: document.getElementById("strokeWidthValue"),
      maxWidth: document.getElementById("maxWidthValue")
    };

    const image = new Image();

    function syncValues() {
      valueEls.fontSize.textContent = fontSizeEl.value + " px";
      valueEls.bottomGap.textContent = bottomGapEl.value + " px";
      valueEls.strokeWidth.textContent = strokeWidthEl.value + " px";
      valueEls.maxWidth.textContent = maxWidthEl.value + " %";
    }

    function wrapText(text, maxWidth) {
      const lines = [];
      let current = "";

      for (const char of text) {
        if (char === "\n") {
          lines.push(current || " ");
          current = "";
          continue;
        }

        const trial = current + char;
        if (ctx.measureText(trial).width > maxWidth && current) {
          lines.push(current);
          current = char;
        } else {
          current = trial;
        }
      }

      lines.push(current || " ");
      return lines;
    }

    function drawSubtitle() {
      if (!image.complete || !image.naturalWidth) return;

      canvas.width = image.naturalWidth;
      canvas.height = image.naturalHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, 0, 0);

      const fontSize = Number(fontSizeEl.value);
      const bottomGap = Number(bottomGapEl.value);
      const strokeWidth = Number(strokeWidthEl.value);
      const maxWidth = canvas.width * (Number(maxWidthEl.value) / 100);
      const lineHeight = Math.round(fontSize * 1.2);
      const text = subtitleEl.value.trim() || " ";

      ctx.font = "700 " + fontSize + "px \"Noto Sans TC\", \"Microsoft JhengHei\", \"PingFang TC\", sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";

      const lines = wrapText(text, maxWidth);
      const totalHeight = lines.length * lineHeight;
      const startY = canvas.height - bottomGap - totalHeight + fontSize;

      ctx.lineJoin = "round";
      ctx.lineWidth = strokeWidth;
      ctx.strokeStyle = "rgba(0, 0, 0, 0.78)";
      ctx.fillStyle = "#ffffff";

      lines.forEach((line, index) => {
        const y = startY + index * lineHeight;
        ctx.strokeText(line, canvas.width / 2, y);
        ctx.fillText(line, canvas.width / 2, y);
      });

      saveImage.src = canvas.toDataURL("image/png");
    }

    function prefersTouchSave() {
      return window.matchMedia("(pointer: coarse)").matches || window.matchMedia("(max-width: 820px)").matches;
    }

    image.addEventListener("load", drawSubtitle);

    [subtitleEl, fontSizeEl, bottomGapEl, strokeWidthEl, maxWidthEl].forEach((el) => {
      el.addEventListener("input", () => {
        syncValues();
        drawSubtitle();
      });
    });

    downloadBtn.addEventListener("click", () => {
      drawSubtitle();
      if (prefersTouchSave()) {
        saveHint.textContent = "\u8acb\u9577\u6309\u5716\u7247\uff0c\u9078\u64c7\u5132\u5b58\u5716\u7247\u6216\u52a0\u5165\u7167\u7247\u3002";
        saveImage.scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }

      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "cat-subtitle.png";
      link.click();
    });

    resetBtn.addEventListener("click", () => {
      subtitleEl.value = "\u4eca\u5929\u4e5f\u8981\u8a18\u5f97\u9935\u6211\u3002";
      fontSizeEl.value = 34;
      bottomGapEl.value = 26;
      strokeWidthEl.value = 4;
      maxWidthEl.value = 84;
      syncValues();
      drawSubtitle();
    });

    syncValues();
    image.src = embeddedImage;
  </script>
</body>
</html>
